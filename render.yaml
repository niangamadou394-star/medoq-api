services:
  - type: web
    name: medoq-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 86400
      - key: JWT_REFRESH_EXPIRES_IN
        value: 604800
      - key: COMMISSION_RATE
        value: 1.5
      - key: RESERVATION_EXPIRY_HOURS
        value: 2
      - key: DELIVERY_FEE
        value: 1500
      - key: DATABASE_URL
        fromDatabase:
          name: medoq-db
          property: connectionString
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_SENDER_ID
        value: Medoq
      - key: OTP_REQUIRED
        value: "true"

databases:
  - name: medoq-db
    plan: free
    databaseName: medoq
    user: medoq
